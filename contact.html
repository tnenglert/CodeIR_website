<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeIR — Contact</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="faq-header">
        <div class="hero-overlay">
            <h1><a href="index.html" class="faq-home-link">CodeIR</a></h1>
            <p>Contact</p>
        </div>
    </header>

    <!-- hamburger menu -->
    <div class="menu-wrapper">
      <button class="menu-btn" onclick="document.querySelector('.menu-dropdown').classList.toggle('menu-open')">
          <span></span>
          <span></span>
          <span></span>
      </button>
      <nav class="menu-dropdown">
          <a href="index.html">Home</a>
          <a href="how_it_works.html">How It Works</a>
          <a href="faq.html">FAQ</a>
          <a href="contact.html">Contact</a>
      </nav>
    </div>

    <main class="container" style="text-align: center; padding-top: 100px;">
        <p style="font-size: 1.1rem; opacity: 0.7; margin-bottom: 24px;">Get in touch</p>
        <span onclick="copyEmail()" style="color: var(--accent-L2); font-size: 1.4rem; font-family: var(--mono-font); cursor: pointer;">hello@codeir.dev</span>
        <p id="copy-toast" style="font-size: 0.8rem; opacity: 0; margin-top: 12px; transition: opacity 0.3s ease;">copied</p>
    </main>

<script>
function copyEmail() {
    navigator.clipboard.writeText('hello@codeir.dev').then(() => {
        const toast = document.getElementById('copy-toast');
        toast.style.opacity = '0.5';
        setTimeout(() => toast.style.opacity = '0', 1800);
    });
}
</script>
</body>
</html>
